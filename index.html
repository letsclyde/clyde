<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clyde - Premium Shoe Cleaner</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at top, #0a1628 0%, #000 70%);
            color: #fff;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(2px 2px at 20% 30%, rgba(59,130,246,0.3), transparent),
                radial-gradient(2px 2px at 80% 20%, rgba(59,130,246,0.2), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(59,130,246,0.15), transparent),
                radial-gradient(2px 2px at 90% 80%, rgba(59,130,246,0.2), transparent),
                radial-gradient(2px 2px at 10% 90%, rgba(59,130,246,0.1), transparent),
                radial-gradient(2px 2px at 60% 50%, rgba(59,130,246,0.2), transparent);
            animation: twinkle 4s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            margin-bottom: 10px;
        }

        .logo img {
            width: 160px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3));
        }

        .tagline {
            color: #64748b;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        /* Section labels */
        .section-label {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #3b82f6;
            margin-bottom: 14px;
            font-weight: 600;
        }

        /* Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(255,255,255,0.12);
        }

        .link-btn .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-btn svg {
            width: 22px;
            height: 22px;
        }

        .link-btn .text {
            text-align: left;
        }

        .link-btn .text span {
            display: block;
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Social icon backgrounds */
        .youtube .icon { background: #ff0000; }
        .tiktok .icon { background: #000; border: 1px solid #333; }
        .facebook .icon { background: #1877f2; }
        .instagram .icon { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .shopee .icon { background: transparent; }
        .lazada .icon { background: transparent; }
        .tiktokshop .icon { background: transparent; }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.2), transparent);
            margin: 8px 0 28px;
        }

        /* QR Section */
        .qr-section {
            margin-top: 10px;
        }

        .qr-section .section-label {
            margin-bottom: 16px;
        }

        #qrcode {
            display: inline-block;
            padding: 10px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        }

        /* Footer */
        .footer {
            margin-top: 24px;
            font-size: 0.7rem;
            color: #334155;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <script>
        const pageUrl = "https://letsclyde.github.io/clyde/";
        new QRCode(document.getElementById("qrcode"), {
            text: pageUrl,
            width: 160,
            height: 160,
            colorDark: "#000000",
            colorLight: "#ffffff",

</html>
